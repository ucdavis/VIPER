# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false
tone_instructions: >
  Direct and concise. Skip preamble and praise. Lead with the issue, then the
  fix.

reviews:
  profile: assertive
  request_changes_workflow: false
  # No unsolicited summaries — CodeRabbit should only summarize when a review
  # is explicitly requested via `@coderabbitai review` or `@coderabbitai summary`.
  high_level_summary: false
  poem: false
  review_status: false
  collapse_walkthrough: true
  auto_review:
    enabled: false
    drafts: false
    auto_pause_after_reviewed_commits: 5
    base_branches:
      - main
      - "VPR-.*"
    labels:
      - "review-ready"
    ignore_usernames:
      - "dependabot[bot]"
    ignore_title_keywords:
      - WIP

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/bin/**"
    - "!**/obj/**"
    - "!web/wwwroot/vue/**"
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/*.min.js"
    - "!**/*.min.css"

  tools:
    github-checks:
      enabled: true
      timeout_ms: 90000
    languagetool:
      enabled: true
      level: default

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  code_guidelines:
    enabled: true
    filePatterns:
      - ".github/copilot-instructions.md"
